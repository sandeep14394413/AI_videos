name: Generate Ghibli Moral Story Video

on:
  workflow_dispatch:

jobs:
  generate-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick libmagickwand-dev

      - name: Fix ImageMagick Security Policy for MoviePy
        run: |
          # Find the policy file
          POLICY_FILE=$(find /etc/ImageMagick* -name policy.xml | head -n 1)
          echo "Found policy file at: $POLICY_FILE"
          
          # Comment out the restrictive @* policy (this is the main fix)
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"/<!-- <policy domain="path" rights="none" pattern="@*"/' "$POLICY_FILE"
          sudo sed -i 's/<\/policy>/ --> <\/policy>/' "$POLICY_FILE"
          
          # Also allow PDF if needed (extra safety)
          sudo sed -i 's/<policy domain="coder" rights="none" pattern="PDF" \/>/<!-- <policy domain="coder" rights="none" pattern="PDF" \/> -->/' "$POLICY_FILE"
          
          echo "ImageMagick policy updated successfully for TextClip"

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install diffusers transformers accelerate gtts moviepy==1.0.3 pillow

      - name: Generate Ghibli Moral Video
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python ghibli_video_generator.py

      - name: Upload Generated Video
        uses: actions/upload-artifact@v4
        with:
          name: ghibli-moral-video
          path: generated_ghibli_videos/*.mp4
          retention-days: 7
