name: Generate Ghibli Moral Story Video

on:
  workflow_dispatch:           # Allows manual trigger from GitHub UI
  # schedule:
  #   - cron: '0 4 * * *'      # Uncomment if you want daily automatic run

jobs:
  generate-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          # CPU version of PyTorch (GitHub runners don't have GPU by default)
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          # Main libraries
          pip install diffusers transformers accelerate gtts moviepy==1.0.3 pillow

      - name: Generate Ghibli Moral Video
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python ghibli_video_generator.py

      - name: Upload Generated Video
        uses: actions/upload-artifact@v4
        with:
          name: ghibli-moral-video
          path: generated_ghibli_videos/*.mp4
          retention-days: 7

      - name: List Generated Files
        run: |
          echo "Generated files:"
          ls -la generated_ghibli_videos/
