name: Generate Ghibli Moral Video

on:
  workflow_dispatch:        # Manual trigger
  schedule:
    - cron: '0 3 * * *'     # Run daily at 3:00 AM UTC (optional)

jobs:
  generate-video:
    runs-on: self-hosted     # Your Linux self-hosted runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'     # More stable than 3.13 for these libraries

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak libsndfile1

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install diffusers transformers accelerate moviepy==1.0.3 pyttsx3 pillow

      - name: Run Ghibli Video Generator
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python ghibli_video_generator.py

      - name: Upload generated video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghibli-video
          path: generated_ghibli_videos/*.mp4
          retention-days: 7
